# Distillation: Reverse-KL compression to Qwen3-7B
model: Qwen/Qwen3-7B

dataset:
  - /mnt/users/rwl/topoprm/data/sft_ready/distill_train.jsonl

train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear

per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_length: 4096
bf16: true
gradient_checkpointing: true
deepspeed: zero3

save_steps: 200
save_total_limit: 3
report_to:
  - tensorboard
logging_steps: 10
output_dir: /mnt/users/rwl/topoprm/output/distill_7b
