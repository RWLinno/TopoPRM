# GRPO: Full TopoPRM - Qwen3-32B with vLLM server mode
model: Qwen/Qwen3-32B
adapters:
  - output/sft_qwen3_32b/v1-20260316-154443/checkpoint-120

dataset:
  - data/grpo_ready/train.jsonl

external_plugins:
  - src/reward/composite_reward.py
reward_funcs:
  - topo_composite

num_generations: 8
temperature: 0.7
max_completion_length: 2048
top_p: 0.95

use_vllm: true
vllm_mode: server
vllm_server_base_url:
  - "http://127.0.0.1:8000"

train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 8192
bf16: true
gradient_checkpointing: true

save_steps: 50
save_total_limit: 5
report_to:
  - tensorboard
logging_steps: 5
output_dir: output/grpo_main
