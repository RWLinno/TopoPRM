# ms-swift 4.x SFT configuration for Qwen3-14B
model: Qwen/Qwen3-14B

# Dataset (flat list of paths)
dataset:
  - data/sft_ready/train.jsonl

# LoRA
train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

# Training hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_length: 8192

# Precision
bf16: true

# DeepSpeed
deepspeed: zero3

# Evaluation & checkpointing
eval_strategy: steps
eval_steps: 100
save_steps: 200
save_total_limit: 5

# Logging
report_to:
  - tensorboard
logging_steps: 10

# Gradient checkpointing
gradient_checkpointing: true

# Output
output_dir: output/sft_qwen3_14b
