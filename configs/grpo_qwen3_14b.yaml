# ms-swift 4.x GRPO configuration for Qwen3-14B (post-SFT)
model: Qwen/Qwen3-14B
adapters:
  - /mnt/users/rwl/topoprm/output/sft_qwen3_14b/v0-20260313-195147/checkpoint-120

# Dataset (flat list of paths)
dataset:
  - /mnt/users/rwl/topoprm/data/grpo_ready/train.jsonl

# Custom reward plugin
external_plugins:
  - /mnt/users/rwl/topoprm/src/reward/composite_reward.py
reward_funcs:
  - topo_composite

# Generation
num_generations: 8
temperature: 0.7
max_completion_length: 4096
top_p: 0.95

# LoRA
train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

# DeepSpeed
deepspeed: zero2

# Training hyperparameters
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 8192

# Precision
bf16: true

# Checkpointing
save_steps: 100
save_total_limit: 3

# Logging
report_to:
  - tensorboard
logging_steps: 5

# Gradient checkpointing
gradient_checkpointing: true

# Output
output_dir: output/grpo_qwen3_14b
