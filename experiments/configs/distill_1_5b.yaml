# Distillation: SFT student on teacher-generated data - Qwen3-1.5B
model: Qwen/Qwen3-1.5B

dataset:
  - /mnt/users/rwl/topoprm/data/sft_ready/distill_train.jsonl

train_type: lora
lora_rank: 32
lora_alpha: 64
target_modules: all-linear
lora_dropout: 0.05

per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 3e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 4096
bf16: true
gradient_checkpointing: true

eval_strategy: steps
eval_steps: 100
save_steps: 100
save_total_limit: 3
report_to:
  - tensorboard
logging_steps: 10
output_dir: /mnt/users/rwl/topoprm/output/distill_1_5b
