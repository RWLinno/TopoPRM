# Distillation: Reverse-KL compression to Qwen3-1.5B
model: Qwen/Qwen3-1.5B

dataset:
  - /mnt/users/rwl/topoprm/data/sft_ready/distill_train.jsonl

train_type: lora
lora_rank: 32
lora_alpha: 64
target_modules: all-linear

per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 3e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_length: 4096
bf16: true
gradient_checkpointing: true
deepspeed: zero2

save_steps: 200
save_total_limit: 3
report_to:
  - tensorboard
logging_steps: 10
output_dir: /mnt/users/rwl/topoprm/output/distill_1_5b
