# ms-swift 4.x SFT configuration for Qwen3-32B on 8x L20X
model: Qwen/Qwen3-32B

dataset:
  - /mnt/users/rwl/topoprm/data/sft_ready/train.jsonl

train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_length: 8192

bf16: true
deepspeed: zero2

eval_strategy: steps
eval_steps: 100
save_steps: 200
save_total_limit: 5

report_to:
  - tensorboard
logging_steps: 10
gradient_checkpointing: true

output_dir: /mnt/users/rwl/topoprm/output/sft_qwen3_32b
