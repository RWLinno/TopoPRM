# GRPO: No topology reward (ablation) - Qwen3-32B
model: /mnt/users/rwl/models/Qwen/Qwen3-32B
adapters:
  - /mnt/users/rwl/topoprm/output/sft_qwen3_32b/v1-20260316-154443/checkpoint-120

dataset:
  - /mnt/users/rwl/topoprm/data/grpo_ready/train.jsonl

external_plugins:
  - /mnt/users/rwl/topoprm/src/reward/ablation_rewards.py
reward_funcs:
  - ablation_no_topo

num_generations: 8
temperature: 0.7
max_completion_length: 2048
top_p: 0.95

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.5
vllm_max_model_len: 4096
vllm_enable_prefix_caching: false
sleep_level: 1
offload_model: true
offload_optimizer: true

train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 8192
bf16: true
gradient_checkpointing: true

save_steps: 50
save_total_limit: 3
report_to:
  - tensorboard
logging_steps: 5
output_dir: /mnt/users/rwl/topoprm/output/grpo_no_topo
