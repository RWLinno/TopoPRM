# ms-swift 4.x SFT configuration for Qwen3-32B on 8x L20X
model: /mnt/users/rwl/models/Qwen/Qwen3-32B

dataset:
  - /mnt/users/rwl/topoprm/data/sft_ready/train_augmented.jsonl

train_type: lora
lora_rank: 64
lora_alpha: 128
target_modules: all-linear
lora_dropout: 0.05

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_length: 8192

bf16: true

eval_strategy: steps
eval_steps: 50
save_steps: 50
save_total_limit: 3

report_to:
  - tensorboard
logging_steps: 5
gradient_checkpointing: true

output_dir: /mnt/users/rwl/topoprm/output/sft_qwen3_32b
